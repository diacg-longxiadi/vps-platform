<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>帝云 - 登入</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #0f0f0f; color: #e0e0e0; }
    .input-box { background: #1a1a1a; border: 1px solid #333; }
    .input-box:focus { border-color: #555; outline: none; }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center px-4 py-10">
  <div class="mb-10 text-center">
    <div class="mb-4">
      <div class="w-20 h-20 mx-auto bg-gray-800 rounded-xl flex items-center justify-center">
        <span class="text-4xl text-gray-400">◼️</span>
      </div>
    </div>
    <h1 class="text-3xl font-medium text-gray-100">帝云</h1>
    <p class="mt-2 text-xl text-gray-400">登入</p>
  </div>

  <form id="loginForm" class="w-full max-w-lg border border-gray-700 rounded-xl p-8">
    <div class="mb-6">
      <label class="block mb-2 text-gray-300">使用者名稱或電子郵件</label>
      <input type="text" name="account" required placeholder="輸入使用者名稱或電子郵件" class="input-box w-full px-4 py-3 rounded-lg text-gray-200" />
    </div>
    <div class="mb-6">
      <label class="block mb-2 text-gray-300">密碼</label>
      <input type="password" name="password" required placeholder="輸入密碼" class="input-box w-full px-4 py-3 rounded-lg text-gray-200" />
    </div>
    <div class="mb-8">
      <label class="block mb-2 text-gray-300">雙重驗證碼 <span class="text-gray-500">(選填)</span></label>
      <input type="text" name="twofa_code" maxlength="6" placeholder="輸入 6 位驗證碼" class="input-box w-full px-4 py-3 rounded-lg text-gray-200" />
      <p class="mt-2 text-sm text-gray-500">如果您啟用了雙重驗證，請輸入驗證碼</p>
      <p class="mt-1 text-sm text-blue-400">無法存取驗證器？使用恢復碼</p>
    </div>
    <button type="submit" class="w-full bg-gray-800 hover:bg-gray-700 py-4 rounded-lg text-gray-400 font-medium">繼續</button>
  </form>

  <div class="mt-10 text-center text-gray-400">
    <p class="mb-3">還沒有帳號？<a href="/register" class="text-blue-400">註冊</a></p>
    <p><a href="#" class="text-blue-400">忘記密碼</a></p>
  </div>

  <script src="/static/auth.js"></script>
  <script>
    const form = document.getElementById("loginForm");
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const fd = new FormData(form);
      const data = Object.fromEntries(fd);
      const res = await postForm("/login", data);
      if (res.redirected) {
        location.href = "/dashboard";
      } else {
        toast("帳密錯誤或雙重驗證碼不正確");
      }
    });
  </script>
</body>
</html>
