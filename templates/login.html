{% extends "base.html" %}
{% block title %}登入 - 帝云{% endblock %}
{% block nav %}{% endblock %}
{% block main %}
<div class="min-h-screen flex items-center justify-center p-4 auth-bg">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <div class="auth-logo w-16 h-16 mx-auto mb-2 rounded-xl flex items-center justify-center">◈</div>
      <h2 class="text-lg font-semibold mb-1">帝云</h2>
      <p class="text-sm text-secondary">登入您的帳號</p>
    </div>
    <div class="card p-6">
      {% if error %}<div class="msg-error mb-4">{{ error }}</div>{% endif %}
      {% if success %}<div class="msg-success mb-4">{{ success }}</div>{% endif %}
      <form class="space-y-4" method="post" action="/login">
        <div>
          <label class="block text-sm mb-1.5 text-secondary">Email</label>
          <input class="input" type="email" name="email" required placeholder="you@example.com" autocomplete="email">
        </div>
        <div>
          <label class="block text-sm mb-1.5 text-secondary">密碼</label>
          <input class="input" type="password" name="password" required placeholder="請輸入密碼" autocomplete="current-password">
        </div>
        <button class="btn-primary w-full" type="submit">登入</button>
      </form>
    </div>
    <div class="mt-6 text-center text-sm">
      <p class="text-tertiary">還沒有帳號？<a href="/register" class="text-link">註冊</a></p>
    </div>
  </div>
</div>
{% endblock %}
