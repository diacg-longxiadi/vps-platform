{% extends "base.html" %}
{% block title %}登入 - 帝云{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">◈</div>
      <h2 class="auth-title">帝云</h2>
      <p class="auth-subtitle">登入您的帳號</p>
    </div>
    {% if error %}<div class="msg msg-error">{{ error }}</div>{% endif %}
    {% if success %}<div class="msg msg-success">{{ success }}</div>{% endif %}
    <form method="post" action="/login">
      <div class="field">
        <label class="field-label">Email</label>
        <input class="input" type="email" name="email" required placeholder="you@example.com">
      </div>
      <div class="field">
        <label class="field-label">密碼</label>
        <input class="input" type="password" name="password" required placeholder="請輸入密碼">
      </div>
      <button class="btn-primary btn-full" type="submit">登入</button>
    </form>
    <p class="auth-link">還沒有帳號？<a href="/register">註冊</a></p>
  </div>
</div>
{% endblock %}
